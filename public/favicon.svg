<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Platform learning</title>
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141922"/>
      <stop offset="100%" stop-color="#0c0f14"/>
    </linearGradient>
    <linearGradient id="page" x1="32" y1="18" x2="32" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4f6fb"/>
      <stop offset="100%" stop-color="#d0d6e0"/>
    </linearGradient>
    <linearGradient id="cover" x1="14" y1="38" x2="50" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3aa89a"/>
      <stop offset="100%" stop-color="#5ee0d0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#5ee0d0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5ee0d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="26" r="21" fill="url(#glow)"/>

  <!-- ascending platforms -->
  <rect x="7" y="51" width="17" height="4.5" rx="2" fill="#3d4f6a"/>
  <rect x="21" y="45" width="17" height="4.5" rx="2" fill="#4a6a7a"/>
  <rect x="37" y="39" width="20" height="4.5" rx="2" fill="#5ee0d0"/>

  <!-- player cube -->
  <rect x="26.5" y="36" width="10" height="10" rx="2" fill="#f4c95d"/>
  <rect x="28" y="37.5" width="7" height="7" rx="1.2" stroke="#c9922e" stroke-width="0.8" fill="none" opacity="0.45"/>

  <!-- open book -->
  <path
    d="M32 15C23 15 18 17.5 18 20.5v20.5c0 2.2 4.5 4.2 14 6 9.5-1.8 14-3.8 14-6V20.5C46 17.5 41 15 32 15Z"
    fill="url(#cover)"
  />
  <path d="M32 15v32" stroke="#2d8f84" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M18 21c0 2.2 5.2 4.5 14 6V21c-5.8-1.2-10.8-1.2-14 0Z" fill="url(#page)"/>
  <path d="M46 21c0 2.2-5.2 4.5-14 6V21c5.8-1.2 10.8-1.2 14 0Z" fill="url(#page)"/>
  <path d="M21 27h6M21 31h4" stroke="#8b93a6" stroke-width="1.15" stroke-linecap="round" opacity="0.5"/>
  <path d="M37 27h6M39 31h4" stroke="#8b93a6" stroke-width="1.15" stroke-linecap="round" opacity="0.5"/>

  <!-- insight bulb -->
  <g transform="translate(47 15)">
    <path d="M0-5.5a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Z" fill="#f4c95d"/>
    <path d="M-2.2 4.2h4.4l-.8 2.2h-2.8l-.8-2.2Z" fill="#c9922e"/>
    <path d="M0-9v1.8M-4-7l1.2 1.2M4-7l-1.2 1.2" stroke="#ffe8a8" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
  </g>
</svg>
